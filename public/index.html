<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>SALA 33 - Noir Retro</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            background: #0d0d0d; color: #cccccc; font-family: 'Courier New', monospace; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; margin: 0; overflow: hidden;
        }
        
        /* Menu de Entrada Estilo Arcade/Terminal */
        #menu { 
            background: #161616; padding: 30px; 
            border: 4px double #ffffff; 
            box-shadow: 8px 8px 0px #333333;
            text-align: center; width: 320px;
        }
        #menu h2 { color: #ffffff; margin-top: 0; font-size: 24px; letter-spacing: 4px; }
        #menu p { font-size: 11px; color: #777777; margin-bottom: 20px; }
        
        input[type="text"] { 
            width: 100%; padding: 10px; background: #222222; color: #ffffff; 
            border: 2px solid #555555; font-family: 'Courier New', monospace;
            text-align: center; font-size: 14px; outline: none; margin-bottom: 15px;
        }
        input[type="text"]:focus { border-color: #ffffff; }
        
        button { 
            width: 100%; padding: 12px; background: #ffffff; color: #0d0d0d; 
            border: none; font-family: 'Courier New', monospace; font-weight: bold; 
            font-size: 14px; cursor: pointer; box-shadow: 4px 4px 0px #555555;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        button:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px #555555; }
        button:hover { background: #cccccc; }

        /* Interface do Jogo */
        #gameUI { display: none; flex-direction: column; align-items: center; }
        canvas { background: #1a1a1a; image-rendering: pixelated; border: 4px solid #ffffff; width: 800px; height: 600px; }
        
        #chatContainer { width: 800px; margin-top: 10px; }
        #chatBox { 
            height: 110px; background: #161616; border: 2px solid #444444; 
            padding: 10px; overflow-y: auto; text-align: left; margin-bottom: 5px; 
            font-size: 13px; line-height: 1.6; color: #bbbbbb;
        }
        #chatInput { 
            width: 100%; padding: 10px; background: #161616; color: #ffffff; 
            border: 2px solid #444444; font-family: 'Courier New', monospace; outline: none;
        }
        #chatInput:focus { border-color: #ffffff; }
        .sistema { color: #666666; font-style: italic; }
    </style>
</head>
<body>

    <div id="menu">
        <h2>SALA 33</h2>
        <p>CONEXÃO LOCAL // PROTOCOLO WS</p>
        <input type="text" id="username" placeholder="NOME DO BICHO" maxlength="12">
        <button onclick="conectar()">ENTRAR</button>
    </div>

    <div id="gameUI">
        <canvas id="gameCanvas" width="400" height="300"></canvas>
        <div id="chatContainer">
            <div id="chatBox"></div>
            <input type="text" id="chatInput" placeholder="Pressione ENTER para falar...">
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
