<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Sala33</title>
    <style>
        body { background: #121212; color: #fff; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #menu { background: #222; padding: 20px; border: 2px solid #555; text-align: center; }
        input, button { margin: 5px; padding: 8px; background: #333; color: white; border: 1px solid #777; font-family: monospace; }
        
        #gameUI { display: none; flex-direction: column; align-items: center; }
        canvas { background: #1a1a1a; image-rendering: pixelated; border: 4px solid #fff; width: 800px; height: 600px; }
        
        /* Estilo do Chat */
        #chatContainer { width: 800px; margin-top: 10px; }
        #chatBox { height: 100px; background: #222; border: 2px solid #555; padding: 10px; overflow-y: auto; text-align: left; margin-bottom: 5px; font-size: 14px; }
        #chatInput { width: 100%; box-sizing: border-box; }
        .sistema { color: #888; font-style: italic; }
    </style>
</head>
<body>

    <div id="menu">
        <h2>SALA 33</h2>
        <input type="text" id="username" placeholder="Seu Nome">
        <br><br>
        <button onclick="conectar()">Entrar na Sala</button>
    </div>

    <div id="gameUI">
        <canvas id="gameCanvas" width="400" height="300"></canvas>
        <div id="chatContainer">
            <div id="chatBox"></div>
            <input type="text" id="chatInput" placeholder="Pressione ENTER para falar...">
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
