<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>SALA 33 - Noir Retro</title>
    <script src="https://cdn.jsdelivr.net/npm/twemoji@14.0.2/dist/twemoji.min.js" crossorigin="anonymous"></script>
    <style>
        * { box-sizing: border-box; }
        body { 
            background: #0d0d0d; color: #cccccc; font-family: 'Courier New', monospace; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; margin: 0; overflow: hidden;
        }
        
        /* Menu de Entrada Estilo Caixa de Diálogo */
        #menu { 
            background: #161616; padding: 30px; 
            border: 4px solid #ffffff; 
            box-shadow: 8px 8px 0px #333333;
            text-align: center; width: 360px;
        }
        #menu h2 { color: #ffffff; margin-top: 0; font-size: 24px; letter-spacing: 4px; }
        #menu p { font-size: 11px; color: #777777; margin-bottom: 20px; }
        
        input[type="text"] { 
            width: 100%; padding: 10px; background: #222222; color: #ffffff; 
            border: 2px solid #555555; font-family: 'Courier New', monospace;
            text-align: center; font-size: 14px; outline: none; margin-bottom: 15px;
        }
        input[type="text"]:focus { border-color: #ffffff; }

        /* Container do Seletor Listado + Preview Window */
        .selector-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #222222;
            border: 2px solid #555555;
            padding: 10px;
            margin-bottom: 20px;
            text-align: left;
        }
        .selector-fields { width: 70%; }
        .selector-fields label { font-size: 10px; color: #888888; display: block; margin-bottom: 5px; }
        
        select {
            width: 100%; padding: 6px; background: #161616; color: #ffffff;
            border: 1px solid #555555; font-family: 'Courier New', monospace;
            font-size: 12px; outline: none; cursor: pointer;
        }
        select:focus { border-color: #ffffff; }

        /* Janela de Visualização da Skin */
        .preview-window {
            width: 64px; height: 64px; background: #111111;
            border: 2px dashed #555555; display: flex; align-items: center;
            justify-content: center; position: relative;
        }
        #spritePreview {
            width: 32px; height: 32px;
            image-rendering: pixelated;
            display: none;
        }
        .preview-fallback {
            font-size: 9px; color: #444444; text-align: center; font-weight: bold;
        }
        
        button { 
            width: 100%; padding: 12px; background: #ffffff; color: #0d0d0d; 
            border: none; font-family: 'Courier New', monospace; font-weight: bold; 
            font-size: 14px; cursor: pointer; box-shadow: 4px 4px 0px #555555;
        }
        button:hover { background: #cccccc; }

        /* Interface do Jogo */
        #gameUI { display: none; flex-direction: column; align-items: center; }
        canvas { background: #1a1a1a; image-rendering: pixelated; border: 4px solid #ffffff; width: 800px; height: 600px; }
        
        #chatContainer { width: 800px; margin-top: 10px; }
        #chatBox { 
            height: 110px; background: #161616; border: 2px solid #444444; 
            padding: 10px; overflow-y: auto; text-align: left; margin-bottom: 5px; 
            font-size: 13px; line-height: 1.6; color: #bbbbbb;
        }
        


        #chatInput { width: 100%; padding: 10px; background: #161616; color: #ffffff; border: 2px solid #444444; font-family: 'Courier New', monospace; outline: none; }
        #chatInput:focus { border-color: #ffffff; }
        .sistema { color: #666666; font-style: italic; }

        /* Relógio BRT */
        #relogioChat {
            text-align: right; font-size: 9px; color: #444;
            margin-bottom: 3px; font-family: 'Courier New', monospace;
            letter-spacing: 1px;
        }

        /* Barra de emojis */
        #emojiBarContainer { position: relative; display: flex; align-items: stretch; gap: 0; margin-top: 5px; }
        #emojiToggle {
            width: 38px; height: 38px; padding: 0; flex-shrink: 0;
            background: #161616; color: #ffffff;
            border: 2px solid #444444; border-right: none;
            font-size: 18px; box-shadow: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        #emojiToggle:hover { border-color: #fff; }
        #emojiBarContainer #chatInput { flex: 1; min-width: 0; width: auto; border-left: none; margin-bottom: 0; }
        #emojiPanel {
            display: none; position: absolute; bottom: 110%; left: 0;
            background: #111; border: 2px solid #333;
            padding: 8px; z-index: 100;
            display: none;
        }
        #emojiPanel.aberto { display: grid !important; grid-template-columns: repeat(6, 28px); gap: 3px; }
        .emoji-btn {
            width: 28px; height: 28px; background: #161616;
            border: 1px solid #222; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            padding: 0; box-shadow: none; font-size: 16px;
        }
        .emoji-btn:hover { border-color: #fff; background: #2a2a2a; }
        /* Twemoji — grayscale universal */
        img.emoji {
            filter: grayscale(100%) brightness(0.8) !important;
            image-rendering: pixelated;
        }
        .emoji-btn img.emoji { width: 18px !important; height: 18px !important; }
        #chatBox img.emoji { height: 1.1em !important; width: 1.1em !important; vertical-align: -0.15em !important; }
        #emojiToggle img.emoji { width: 20px !important; height: 20px !important; }
        .msg-hora { color: #3a3a3a; font-size: 9px; margin-right: 5px; user-select: none; }
    </style>
</head>
<body>

    <div id="menu">
        <h2>SALA 33</h2>
        <p>CONEXÃO LOCAL // PROTOCOLO WS</p>
        
        <input type="text" id="username" placeholder="NOME DO BICHO" maxlength="16">
        
        <div class="selector-container">
            <div class="selector-fields">
                <label>PERSONAGEM (32x32):</label>
                <select id="spriteSelect">
                </select>
            </div>
            <div class="preview-window" id="previewWinBox">
                <img id="spritePreview" src="" alt="Preview">
                <div id="fallbackText" class="preview-fallback">32x32</div>
            </div>
        </div>

        <button id="btnEntrar" onclick="conectar()">ENTRAR</button>
    </div>

    <div id="gameUI">
        <canvas id="gameCanvas" width="400" height="300"></canvas>
        <div id="chatContainer">
            <div id="relogioChat"></div>
            <div id="chatBox"></div>

            <div id="emojiBarContainer">
                <div id="emojiPanel"></div>
                <button id="emojiToggle" onclick="togglePainelEmoji()">&#128512;</button>
            </div>
                        <input type="text" id="chatInput" placeholder="Pressione ENTER para falar..." maxlength="200">
        </div>
    </div>

    <script src="game.js"></script>

    <div id="configMenu" style="display: none; position: absolute; top: 10px; left: 10px; background: #161616; padding: 15px; border: 1px solid #fff; color: #fff; font-family: monospace;">
        <div>VOLUME</div>
        <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="0.5" oninput="ajustarVolume(this.value)">
        <div style="font-size: 8px; margin-top: 5px;">[F1] FECHAR</div>
    </div>

        <div style="width: 100%; height: 1px; background: #2a2a2a;"></div>

        <a href="https://discord.gg/cywhY5n9u8" target="_blank"

        <div style="width: 100%; height: 1px; background: #2a2a2a;"></div>

        <div style="font-size: 9px; color: #3a3a3a; line-height: 1.8;">
            <div>PROJETO DE</div>
            <a href="https://github.com/RamonCout0" target="_blank"
               style="color: #555; text-decoration: none; letter-spacing: 1px;"

            <div style="margin-top: 4px; color: #2a2a2a;">© 2026</div>

    </footer>
</body>
</html>
